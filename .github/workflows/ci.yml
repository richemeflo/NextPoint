name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  node:
    name: Lint, typecheck, and tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Start Supabase database
        run: npm run supabase:db:start

      - name: Reset Supabase database
        run: npm run supabase:db:reset

      - name: Test Supabase database
        run: npm run supabase:test:db

      - name: Stop Supabase
        if: always()
        run: npm run supabase:stop
